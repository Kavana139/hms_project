<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password — MediCore HMS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1a6fc4;--blue-dark:#155fa0;--blue-light:#e8f1fb;
    --teal:#0f9e75;--red:#e24b4a;--gray:#6b7280;
    --border:#e5e7eb;--bg:#f0f4f8;--white:#ffffff;
    --text:#1f2937;--text-sm:#6b7280;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:var(--bg);min-height:100vh;display:flex;align-items:center;
       justify-content:center;padding:20px}
  .container{width:100%;max-width:420px}

  .brand{text-align:center;margin-bottom:32px}
  .brand-icon{width:56px;height:56px;background:var(--blue);border-radius:14px;
              display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
  .brand-icon svg{width:28px;height:28px;fill:white}
  .brand h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .brand p{font-size:13px;color:var(--text-sm);margin-top:4px}

  .card{background:var(--white);border-radius:16px;padding:32px;
        box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .card h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
  .card .subtitle{font-size:13px;color:var(--text-sm);margin-bottom:24px}

  .form-group{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
  input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
        font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.12)}

  .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
  .alert.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
  .alert.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
  .alert.show{display:block}

  .btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
       border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
       transition:background .2s,transform .1s;letter-spacing:.2px}
  .btn:hover{background:var(--blue-dark)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#93b4d8;cursor:not-allowed}

  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);
           border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
           display:none;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-sm)}
  .back-link a{color:var(--blue);text-decoration:none;font-weight:500}
  .back-link a:hover{text-decoration:underline}

  .hint{font-size:12px;color:var(--text-sm);margin-top:8px;line-height:1.5}

  @media (prefers-color-scheme:dark){
    :root{--bg:#0f172a;--white:#1e293b;--text:#f1f5f9;--text-sm:#94a3b8;
          --border:#334155;--blue-light:#1e3a5f}
    input{background:#0f172a;color:#f1f5f9}
  }
</style>
</head>
<body>

<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H8l4-7 4 7h-3v4z"/></svg>
    </div>
    <h1>MediCore HMS</h1>
    <p>Hospital Management System</p>
  </div>

  <div class="card">
    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter your registered email address and we'll send you a password reset link.</p>

    <div class="alert" id="alert"></div>

    <form id="forgot-form" autocomplete="off">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your registered email" autocomplete="email" required/>
        <p class="hint">This must match the email linked to your HMS account (admin, doctor, receptionist, lab tech, or pharmacist).</p>
      </div>

      <button type="submit" class="btn" id="submit-btn">
        <span class="spinner" id="spinner"></span>
        Send Reset Link
      </button>
    </form>
  </div>

  <div class="back-link">
    <a href="/auth/login">← Back to Login</a>
  </div>
</div>

<script>
function showAlert(msg, type='error'){
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = 'alert ' + type + ' show';
}

document.getElementById('forgot-form').addEventListener('submit', async function(e){
  e.preventDefault();

  const btn     = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  btn.disabled  = true;
  spinner.style.display = 'inline-block';

  const email = document.getElementById('email').value.trim();

  try {
    const res  = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if(data.success){
      showAlert(data.message || 'If that email exists, a reset link has been sent.', 'success');
      document.getElementById('forgot-form').reset();
    } else {
      showAlert(data.message || 'Something went wrong. Please try again.');
    }
  } catch(err) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
});
</script>
</body>
</html>

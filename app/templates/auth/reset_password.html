<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — MediCore HMS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1a6fc4;--blue-dark:#155fa0;--blue-light:#e8f1fb;
    --teal:#0f9e75;--red:#e24b4a;--gray:#6b7280;
    --border:#e5e7eb;--bg:#f0f4f8;--white:#ffffff;
    --text:#1f2937;--text-sm:#6b7280;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:var(--bg);min-height:100vh;display:flex;align-items:center;
       justify-content:center;padding:20px}
  .container{width:100%;max-width:420px}

  .brand{text-align:center;margin-bottom:32px}
  .brand-icon{width:56px;height:56px;background:var(--blue);border-radius:14px;
              display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
  .brand-icon svg{width:28px;height:28px;fill:white}
  .brand h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .brand p{font-size:13px;color:var(--text-sm);margin-top:4px}

  .card{background:var(--white);border-radius:16px;padding:32px;
        box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .card h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
  .card .subtitle{font-size:13px;color:var(--text-sm);margin-bottom:24px}

  .form-group{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}

  .input-wrap{position:relative}
  .input-wrap input{padding-right:42px}
  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
           background:none;border:none;cursor:pointer;color:var(--gray);padding:4px}

  input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
        font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.12)}
  input.error{border-color:var(--red)}

  .strength-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
  .strength-fill{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
  .strength-label{font-size:11px;color:var(--text-sm);margin-top:4px}

  .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
  .alert.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
  .alert.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
  .alert.show{display:block}

  .requirements{font-size:12px;color:var(--text-sm);margin-top:6px;line-height:1.7}
  .requirements span{display:inline-block;margin-right:10px}
  .req{opacity:.5;transition:opacity .2s}
  .req.met{opacity:1;color:#16a34a}
  .req.met::before{content:'✓ '}
  .req:not(.met)::before{content:'· '}

  .btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
       border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
       transition:background .2s,transform .1s;letter-spacing:.2px}
  .btn:hover{background:var(--blue-dark)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#93b4d8;cursor:not-allowed}

  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);
           border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
           display:none;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-sm)}
  .back-link a{color:var(--blue);text-decoration:none;font-weight:500}
  .back-link a:hover{text-decoration:underline}

  @media (prefers-color-scheme:dark){
    :root{--bg:#0f172a;--white:#1e293b;--text:#f1f5f9;--text-sm:#94a3b8;
          --border:#334155;--blue-light:#1e3a5f}
    input{background:#0f172a;color:#f1f5f9}
  }
</style>
</head>
<body>

<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H8l4-7 4 7h-3v4z"/></svg>
    </div>
    <h1>MediCore HMS</h1>
    <p>Hospital Management System</p>
  </div>

  <div class="card">
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a strong password for your account. The link expires in 1 hour.</p>

    <div class="alert" id="alert"></div>

    <form id="reset-form" autocomplete="off">
      <input type="hidden" id="token" value="{{ token }}"/>

      <div class="form-group">
        <label for="password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Enter new password" autocomplete="new-password"
                 oninput="checkStrength()" required/>
          <button type="button" class="eye-btn" onclick="togglePwd('password','eye1')" title="Show/hide">
            <svg id="eye1" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
        <div class="requirements">
          <span class="req" id="req-len">8+ characters</span>
          <span class="req" id="req-upper">Uppercase</span>
          <span class="req" id="req-lower">Lowercase</span>
          <span class="req" id="req-num">Number</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Re-enter new password" autocomplete="new-password" required/>
          <button type="button" class="eye-btn" onclick="togglePwd('confirm_password','eye2')" title="Show/hide">
            <svg id="eye2" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="submit-btn">
        <span class="spinner" id="spinner"></span>
        Reset Password
      </button>
    </form>
  </div>

  <div class="back-link">
    <a href="/auth/login">← Back to Login</a>
  </div>
</div>

<script>
function showAlert(msg, type='error'){
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = 'alert ' + type + ' show';
}

function togglePwd(fieldId, iconId){
  const inp = document.getElementById(fieldId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function checkStrength(){
  const pwd   = document.getElementById('password').value;
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');

  const hasLen   = pwd.length >= 8;
  const hasUpper = /[A-Z]/.test(pwd);
  const hasLower = /[a-z]/.test(pwd);
  const hasNum   = /[0-9]/.test(pwd);

  document.getElementById('req-len').classList.toggle('met', hasLen);
  document.getElementById('req-upper').classList.toggle('met', hasUpper);
  document.getElementById('req-lower').classList.toggle('met', hasLower);
  document.getElementById('req-num').classList.toggle('met', hasNum);

  const score = [hasLen, hasUpper, hasLower, hasNum].filter(Boolean).length;
  const levels = [
    { w:'0%',   bg:'',        txt:'' },
    { w:'25%',  bg:'#e24b4a', txt:'Weak' },
    { w:'50%',  bg:'#f59e0b', txt:'Fair' },
    { w:'75%',  bg:'#3b82f6', txt:'Good' },
    { w:'100%', bg:'#16a34a', txt:'Strong' },
  ];
  const lv = pwd.length === 0 ? levels[0] : levels[score];
  fill.style.width      = lv.w;
  fill.style.background = lv.bg;
  label.textContent     = lv.txt;
  label.style.color     = lv.bg;
}

document.getElementById('reset-form').addEventListener('submit', async function(e){
  e.preventDefault();

  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm_password').value;
  const token    = document.getElementById('token').value;

  if(password.length < 8){
    showAlert('Password must be at least 8 characters.');
    return;
  }
  if(password !== confirm){
    showAlert('Passwords do not match.');
    return;
  }

  const btn     = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  btn.disabled  = true;
  spinner.style.display = 'inline-block';

  try {
    const res  = await fetch('/auth/reset-password/' + token, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password, confirm_password: confirm })
    });
    const data = await res.json();

    if(data.success){
      showAlert(data.message || 'Password reset successfully!', 'success');
      setTimeout(()=>{ window.location.href = data.redirect || '/auth/login'; }, 1500);
    } else {
      showAlert(data.message || 'Reset failed. Please try again.');
    }
  } catch(err) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
});
</script>
</body>
</html>

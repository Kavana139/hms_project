<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Two-Factor Authentication — MediCore HMS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1a6fc4;--blue-dark:#155fa0;--blue-light:#e8f1fb;
    --teal:#0f9e75;--red:#e24b4a;--gray:#6b7280;
    --border:#e5e7eb;--bg:#f0f4f8;--white:#ffffff;
    --text:#1f2937;--text-sm:#6b7280;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:var(--bg);min-height:100vh;display:flex;align-items:center;
       justify-content:center;padding:20px}
  .container{width:100%;max-width:420px}
  .brand{text-align:center;margin-bottom:32px}
  .brand-icon{width:56px;height:56px;background:var(--blue);border-radius:14px;
              display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
  .brand-icon svg{width:28px;height:28px;fill:white}
  .brand h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .brand p{font-size:13px;color:var(--text-sm);margin-top:4px}
  .card{background:var(--white);border-radius:16px;padding:32px;
        box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .card h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
  .card .subtitle{font-size:13px;color:var(--text-sm);margin-bottom:24px}
  .form-group{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
  input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
        font-size:18px;font-weight:600;color:var(--text);outline:none;
        text-align:center;letter-spacing:6px;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.12)}
  input.error{border-color:var(--red)}
  .btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
       border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
       transition:background .2s,transform .1s;letter-spacing:.2px;margin-top:8px}
  .btn:hover{background:var(--blue-dark)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#93b4d8;cursor:not-allowed}
  .error-msg{background:#fef2f2;border:1px solid #fecaca;color:var(--red);
             padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
  .back-link{text-align:center;margin-top:20px}
  .back-link a{font-size:13px;color:var(--blue);text-decoration:none}
  .back-link a:hover{text-decoration:underline}
  .otp-icon{text-align:center;margin-bottom:20px}
  .otp-icon svg{width:48px;height:48px;color:var(--blue)}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>MediCore HMS</h1>
    <p>Hospital Management System</p>
  </div>

  <div class="card">
    <div class="otp-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 018 0v4"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
    </div>
    <h2>Two-Factor Authentication</h2>
    <p class="subtitle">Enter the 6-digit code from your authenticator app.</p>

    <div class="error-msg" id="errMsg"></div>

    <div class="form-group">
      <label for="token">Verification Code</label>
      <input type="text" id="token" name="token" maxlength="6"
             inputmode="numeric" pattern="[0-9]*"
             placeholder="000000" autocomplete="one-time-code" autofocus/>
    </div>

    <button class="btn" id="verifyBtn" onclick="verify()">Verify &amp; Login</button>
  </div>

  <div class="back-link">
    <a href="/auth/login">← Back to Login</a>
  </div>
</div>

<script>
  const tokenInput = document.getElementById('token');
  const errMsg     = document.getElementById('errMsg');
  const verifyBtn  = document.getElementById('verifyBtn');

  tokenInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') verify();
  });

  // Auto-submit when 6 digits entered
  tokenInput.addEventListener('input', () => {
    tokenInput.value = tokenInput.value.replace(/\D/g, '').slice(0, 6);
    if (tokenInput.value.length === 6) verify();
  });

  async function verify() {
    const token = tokenInput.value.trim();
    if (token.length !== 6) {
      showError('Please enter a 6-digit code.');
      return;
    }
    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying…';
    errMsg.style.display = 'none';

    try {
      const res  = await fetch('/auth/2fa', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token})
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect || '/';
      } else {
        showError(data.message || 'Invalid code. Please try again.');
        tokenInput.value = '';
        tokenInput.focus();
      }
    } catch(e) {
      showError('Network error. Please try again.');
    } finally {
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verify & Login';
    }
  }

  function showError(msg) {
    errMsg.textContent = msg;
    errMsg.style.display = 'block';
    tokenInput.classList.add('error');
    setTimeout(() => tokenInput.classList.remove('error'), 2000);
  }
</script>
</body>
</html>

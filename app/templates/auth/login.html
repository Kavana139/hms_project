<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MediCore HMS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1a6fc4;--blue-dark:#155fa0;--blue-light:#e8f1fb;
    --teal:#0f9e75;--red:#e24b4a;--gray:#6b7280;
    --border:#e5e7eb;--bg:#f0f4f8;--white:#ffffff;
    --text:#1f2937;--text-sm:#6b7280;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:var(--bg);min-height:100vh;display:flex;align-items:center;
       justify-content:center;padding:20px}
  .container{width:100%;max-width:420px}

  /* Logo / Brand */
  .brand{text-align:center;margin-bottom:32px}
  .brand-icon{width:56px;height:56px;background:var(--blue);border-radius:14px;
              display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
  .brand-icon svg{width:28px;height:28px;fill:white}
  .brand h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .brand p{font-size:13px;color:var(--text-sm);margin-top:4px}

  /* Card */
  .card{background:var(--white);border-radius:16px;padding:32px;
        box-shadow:0 4px 24px rgba(0,0,0,.08)}

  .card h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
  .card .subtitle{font-size:13px;color:var(--text-sm);margin-bottom:24px}

  /* Form */
  .form-group{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
  input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
        font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.12)}
  input.error{border-color:var(--red)}

  .input-wrap{position:relative}
  .input-wrap input{padding-right:42px}
  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
           background:none;border:none;cursor:pointer;color:var(--gray);padding:4px}

  .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .remember-row label{display:flex;align-items:center;gap:7px;font-size:13px;
                       font-weight:400;color:var(--text-sm);cursor:pointer;margin:0}
  .remember-row a{font-size:13px;color:var(--blue);text-decoration:none}
  .remember-row a:hover{text-decoration:underline}

  .btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
       border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
       transition:background .2s,transform .1s;letter-spacing:.2px}
  .btn:hover{background:var(--blue-dark)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#93b4d8;cursor:not-allowed}

  /* Alert */
  .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
  .alert.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
  .alert.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
  .alert.show{display:block}

  /* Spinner */
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);
           border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
           display:inline-block;vertical-align:middle;margin-right:8px;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Divider */
  .divider{text-align:center;margin:22px 0;position:relative}
  .divider::before{content:'';position:absolute;top:50%;left:0;right:0;
                   height:1px;background:var(--border)}
  .divider span{background:var(--white);padding:0 12px;
                font-size:12px;color:var(--text-sm);position:relative}

  /* Role pills */
  .roles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
  .role-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;
             cursor:pointer;border:1.5px solid var(--border);color:var(--gray);
             transition:all .15s;background:var(--white)}
  .role-pill:hover,.role-pill.active{background:var(--blue-light);
    border-color:var(--blue);color:var(--blue)}

  .footer-text{text-align:center;margin-top:20px;font-size:12px;color:var(--text-sm)}

  /* Dark mode */
  @media (prefers-color-scheme:dark){
    :root{--bg:#0f172a;--white:#1e293b;--text:#f1f5f9;--text-sm:#94a3b8;
          --border:#334155;--blue-light:#1e3a5f}
    input{background:#0f172a;color:#f1f5f9}
  }
</style>
</head>
<body>

<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H8l4-7 4 7h-3v4z"/></svg>
    </div>
    <h1>MediCore HMS</h1>
    <p>Hospital Management System</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="alert" id="alert"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" placeholder="Enter username or email"
               autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Enter your password" autocomplete="current-password" required/>
          <button type="button" class="eye-btn" onclick="togglePwd()" id="eye-btn"
                  title="Show/hide password">
            <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label>
          <input type="checkbox" id="remember" name="remember"/>
          Remember me for 24 hours
        </label>
        <a href="/auth/forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="btn" id="login-btn">
        <span class="spinner" id="spinner"></span>
        Sign In
      </button>
    </form>

    <div class="divider"><span>Quick access demo</span></div>

    <div class="roles">
      <div class="role-pill" onclick="fillDemo('admin','Admin@123')">Admin</div>
      <div class="role-pill" onclick="fillDemo('doctor','Admin@123')">Doctor</div>
      <div class="role-pill" onclick="fillDemo('receptionist','Admin@123')">Receptionist</div>
      <div class="role-pill" onclick="fillDemo('pharmacist','Admin@123')">Pharmacist</div>
      <div class="role-pill" onclick="fillDemo('lab_tech','Admin@123')">Lab Tech</div>
    </div>
  </div>

  <div class="footer-text">
    &copy; 2024 MediCore HMS &bull; Secure Hospital Management
  </div>
</div>

<script>
function showAlert(msg, type='error'){
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = 'alert ' + type + ' show';
}

function hideAlert(){
  document.getElementById('alert').className = 'alert';
}

function togglePwd(){
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function fillDemo(user, pass){
  document.getElementById('username').value = user;
  document.getElementById('password').value = pass;
  document.querySelectorAll('.role-pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  hideAlert();
}

document.getElementById('login-form').addEventListener('submit', async function(e){
  e.preventDefault();
  hideAlert();

  const btn     = document.getElementById('login-btn');
  const spinner = document.getElementById('spinner');
  btn.disabled  = true;
  spinner.style.display = 'inline-block';

  const body = {
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value,
    remember: document.getElementById('remember').checked,
  };

  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if(data.success){
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(()=>{ window.location.href = data.redirect; }, 600);
    } else {
      showAlert(data.message || 'Login failed. Please try again.');
      document.getElementById('password').value = '';
    }
  } catch(err) {
    showAlert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
});
</script>
</body>
</html>
